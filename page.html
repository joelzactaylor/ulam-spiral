<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background: #3c3c3c;
      color: #222;
    }
    
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      align-items: start;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="image-grid">
    <figure>
      <img src="Screenshot 2026-06-24 at 13.43.55.png">
    </figure>
    <figure>
      <img src="Screenshot 2026-06-24 at 13.57.43.png">
    </figure>
  </div>
</body>
</html>
